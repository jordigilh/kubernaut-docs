name: Deploy Documentation

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [crd-docs-updated]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to deploy (e.g., v1.1)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch generated CRD API reference
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/jordigilh/kubernaut/main/docs/generated/crds.md \
            -o docs/api-reference/crds.md

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy with mike
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="v1.1"
          fi
          mike deploy --push --update-aliases "$VERSION" latest
